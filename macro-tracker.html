<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Macros">
<title>Macro Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d0d0d;
    --surface: #111111;
    --border: #1e1e1e;
    --border2: #161616;
    --text: #f0f0f0;
    --muted: #a0a0a0;
    --dim: #555555;
    --dimmer: #333333;
    --input-bg: #161616;
    --accent: #d4ff6b;
    --accent-dark: #0d0d0d;
    --green: #6bffd4;
    --blue: #6bb8ff;
    --orange: #ff9f6b;
    --red: #ff6b6b;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overscroll-behavior: none;
  }

  body {
    padding: env(safe-area-inset-top, 40px) 0 env(safe-area-inset-bottom, 20px);
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 18px 40px;
  }

  /* Header */
  .header { margin-bottom: 28px; }
  .header-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--dimmer);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 10px;
  }
  .card-label {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Macro bars */
  .bar-row { margin-bottom: 16px; }
  .bar-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .bar-label { color: var(--muted); text-transform: uppercase; }
  .bar-value { color: var(--text); font-weight: 500; }
  .bar-value.over { color: var(--red); }
  .bar-value span { color: var(--dim); font-weight: 400; }
  .bar-track {
    background: #1a1a1a;
    border-radius: 2px;
    height: 5px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* Remaining */
  .remaining-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding-top: 14px;
    margin-top: 6px;
    border-top: 1px solid var(--border2);
  }
  .rem-cell { text-align: center; }
  .rem-val {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
  }
  .rem-val.over { color: var(--red) !important; }
  .rem-lbl {
    font-size: 8px;
    color: var(--dimmer);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 2px;
  }

  /* Progress header row */
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  /* Buttons */
  .btn-ghost {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--dimmer);
    letter-spacing: 0.05em;
    padding: 4px 0;
  }
  .btn-ghost:active { color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: var(--accent-dark);
    border: none;
    border-radius: 6px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }

  .btn-save {
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    background: var(--accent);
    color: var(--accent-dark);
    border: none;
    border-radius: 6px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-save:active { opacity: 0.8; }

  .btn-reset {
    width: 100%;
    margin-top: 8px;
    padding: 11px;
    background: none;
    color: var(--red);
    border: 1px solid #2a1a1a;
    border-radius: 6px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-reset:active { background: #1a0a0a; }

  /* Inputs */
  input {
    background: var(--input-bg);
    border: 1px solid #222;
    border-radius: 6px;
    padding: 11px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
  }
  input::placeholder { color: #383838; }
  input:focus { border-color: #333; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .input-group {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 10px 0 12px;
  }
  .input-wrap {}
  .input-lbl {
    font-size: 8px;
    color: var(--dimmer);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }

  /* Goal edit */
  .goal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .goal-row-lbl {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .goal-row input { width: 90px; text-align: right; padding: 8px 10px; font-size: 13px; }

  /* Log */
  .log-header-row {
    display: grid;
    grid-template-columns: 1fr 44px 44px 44px 44px 24px;
    gap: 4px;
    margin-bottom: 8px;
  }
  .log-col-lbl {
    font-size: 8px;
    color: var(--dimmer);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
  }
  .log-col-lbl:first-child { text-align: left; }

  .log-entry {
    display: grid;
    grid-template-columns: 1fr 44px 44px 44px 44px 24px;
    gap: 4px;
    align-items: center;
    padding: 9px 0;
    border-top: 1px solid var(--border2);
  }
  .log-name {
    font-size: 12px;
    color: #d0d0d0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .log-num {
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  .log-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #2a2a2a;
    font-size: 16px;
    text-align: center;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
  }
  .log-del:active { color: var(--red); }

  .log-total-row {
    display: grid;
    grid-template-columns: 1fr 44px 44px 44px 44px 24px;
    gap: 4px;
    align-items: center;
    padding: 10px 0 0;
    border-top: 1px solid #222;
    margin-top: 4px;
  }
  .log-total-lbl {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .log-total-num {
    font-size: 12px;
    color: var(--accent);
    text-align: center;
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    font-size: 11px;
    color: var(--dimmer);
    letter-spacing: 0.05em;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    background: none;
    border: none;
    border-radius: 7px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--dim);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: var(--accent-dark);
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const DEFAULT_GOALS = { calories: 2500, protein: 180, carbs: 250, fat: 70 };

function loadState() {
  try {
    const today = new Date().toDateString();
    const saved = JSON.parse(localStorage.getItem('macro-tracker') || '{}');
    return {
      goals: saved.goals || { ...DEFAULT_GOALS },
      entries: saved.date === today ? (saved.entries || []) : [],
      date: today,
    };
  } catch { return { goals: { ...DEFAULT_GOALS }, entries: [], date: new Date().toDateString() }; }
}

function saveState(state) {
  try { localStorage.setItem('macro-tracker', JSON.stringify(state)); } catch {}
}

let state = loadState();
let view = 'log'; // 'log' | 'goals'
let formData = { name: '', calories: '', protein: '', carbs: '', fat: '' };

// ── Helpers ────────────────────────────────────────────────────────────────
function totals() {
  return state.entries.reduce((acc, e) => ({
    calories: acc.calories + (Number(e.calories) || 0),
    protein: acc.protein + (Number(e.protein) || 0),
    carbs: acc.carbs + (Number(e.carbs) || 0),
    fat: acc.fat + (Number(e.fat) || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function clamp(v) { return Math.min(Math.max(v, 0), 100); }

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const t = totals();
  const g = state.goals;

  const macros = [
    { key: 'calories', label: 'Calories', unit: 'kcal', color: '#d4ff6b', remLabel: 'kcal left' },
    { key: 'protein',  label: 'Protein',  unit: 'g',    color: '#6bffd4', remLabel: 'pro left' },
    { key: 'carbs',    label: 'Carbs',    unit: 'g',    color: '#6bb8ff', remLabel: 'carb left' },
    { key: 'fat',      label: 'Fat',      unit: 'g',    color: '#ff9f6b', remLabel: 'fat left' },
  ];

  const barsHTML = macros.map(m => {
    const cur = t[m.key], goal = g[m.key], pct = clamp((cur/goal)*100);
    const over = cur > goal;
    return `
      <div class="bar-row">
        <div class="bar-header">
          <span class="bar-label">${m.label}</span>
          <span class="bar-value ${over ? 'over' : ''}">${cur}<span>/${goal}${m.unit}</span></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${over ? '#ff6b6b' : m.color}"></div>
        </div>
      </div>`;
  }).join('');

  const remHTML = macros.map(m => {
    const rem = g[m.key] - t[m.key];
    return `
      <div class="rem-cell">
        <div class="rem-val ${rem < 0 ? 'over' : ''}" style="color:${rem < 0 ? '' : m.color}">${rem}</div>
        <div class="rem-lbl">${m.remLabel}</div>
      </div>`;
  }).join('');

  const entriesHTML = state.entries.length === 0
    ? `<div class="empty-state">no entries yet — add your first meal</div>`
    : `
      <div class="log-header-row">
        <div class="log-col-lbl">Food</div>
        <div class="log-col-lbl">kcal</div>
        <div class="log-col-lbl">pro</div>
        <div class="log-col-lbl">carb</div>
        <div class="log-col-lbl">fat</div>
        <div></div>
      </div>
      ${state.entries.map(e => `
        <div class="log-entry">
          <div class="log-name">${escHtml(e.name)}</div>
          <div class="log-num">${e.calories || 0}</div>
          <div class="log-num">${e.protein || 0}</div>
          <div class="log-num">${e.carbs || 0}</div>
          <div class="log-num">${e.fat || 0}</div>
          <button class="log-del" onclick="removeEntry('${e.id}')">×</button>
        </div>`).join('')}
      <div class="log-total-row">
        <div class="log-total-lbl">Total</div>
        <div class="log-total-num">${t.calories}</div>
        <div class="log-total-num">${t.protein}</div>
        <div class="log-total-num">${t.carbs}</div>
        <div class="log-total-num">${t.fat}</div>
        <div></div>
      </div>`;

  const goalsHTML = `
    ${macros.map(m => `
      <div class="goal-row">
        <span class="goal-row-lbl">${m.label} (${m.unit})</span>
        <input type="number" min="0" id="goal-${m.key}" value="${g[m.key]}" inputmode="numeric">
      </div>`).join('')}
    <button class="btn-save" onclick="saveGoals()">Save Goals</button>
    <button class="btn-reset" onclick="resetDay()">Reset Today's Log</button>`;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-eyebrow">Daily</div>
      <h1 class="header-title">Macro Tracker</h1>
      <div class="header-date">${formatDate()}</div>
    </div>

    <!-- Progress -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="card-label" style="margin-bottom:0">Progress</div>
      </div>
      ${barsHTML}
      <div class="remaining-grid">${remHTML}</div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab ${view === 'log' ? 'active' : ''}" onclick="setView('log')">Add Food</button>
      <button class="tab ${view === 'goals' ? 'active' : ''}" onclick="setView('goals')">Goals</button>
    </div>

    <!-- Log / Goals Panel -->
    <div class="card">
      ${view === 'log' ? `
        <div class="card-label">Add Food</div>
        <input type="text" id="f-name" placeholder="Food name" value="${escHtml(formData.name)}" oninput="formData.name=this.value" onkeydown="if(event.key==='Enter')addEntry()">
        <div class="input-group">
          ${['calories','protein','carbs','fat'].map(f => `
            <div class="input-wrap">
              <div class="input-lbl">${f}</div>
              <input type="number" min="0" inputmode="numeric" id="f-${f}" value="${formData[f]}" placeholder="0" oninput="formData['${f}']=this.value" onkeydown="if(event.key==='Enter')addEntry()">
            </div>`).join('')}
        </div>
        <button class="btn-primary" onclick="addEntry()">+ Add</button>
        <div style="margin-top:18px">
          <div class="card-label">Today's Log</div>
          ${entriesHTML}
        </div>
      ` : `
        <div class="card-label">Daily Goals</div>
        ${goalsHTML}
      `}
    </div>
  `;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ────────────────────────────────────────────────────────────────
function setView(v) { view = v; render(); }

function addEntry() {
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { document.getElementById('f-name')?.focus(); return; }
  const entry = {
    id: Date.now().toString(),
    name,
    calories: document.getElementById('f-calories')?.value || '0',
    protein:  document.getElementById('f-protein')?.value  || '0',
    carbs:    document.getElementById('f-carbs')?.value    || '0',
    fat:      document.getElementById('f-fat')?.value      || '0',
  };
  state.entries.push(entry);
  formData = { name: '', calories: '', protein: '', carbs: '', fat: '' };
  saveState(state);
  render();
}

function removeEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  saveState(state);
  render();
}

function saveGoals() {
  ['calories','protein','carbs','fat'].forEach(k => {
    const val = Number(document.getElementById(`goal-${k}`)?.value);
    if (!isNaN(val) && val > 0) state.goals[k] = val;
  });
  saveState(state);
  render();
}

function resetDay() {
  if (confirm('Clear today\'s log?')) {
    state.entries = [];
    state.date = new Date().toDateString();
    saveState(state);
    render();
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
